<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Ashtanga Vinyasa · Exam Class · Mira Yogashala 2026</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:      #FAF8F4;
      --dark:    #2C3A4A;
      --terra:   #C8622A;
      --gold:    #B8872E;
      --text:    #2C1A08;
      --muted:   #8B6040;
      --rule:    #E2D5C3;
      --ammo:    #2A6B8C;   /* teal — Ammo */
      --thanu:   #5C7A3E;   /* forest green — Thanusha */
      --markus:  #C8622A;   /* terracotta — Markus */
      --group:   #7A5C3A;   /* warm brown — Group */
    }

    /* ─── GLOBAL ─── */
    html, body {
      width: 100%; height: 100%;
      background: var(--dark);
      font-family: Georgia, serif;
    }

    @media (max-width: 640px) {
      html, body { overflow: visible; height: auto; }
    }

    /* ─── DECK ─── */
    .deck { width: 100vw; height: 100vh; position: relative; }

    @media (max-width: 640px) {
      .deck { height: auto; min-height: 100vh; }
    }

    /* ─── SLIDE BASE ─── */
    .slide {
      position: absolute; inset: 0;
      display: none;
      background: var(--bg);
    }
    .slide.active { display: flex; flex-direction: column; }

    @media (max-width: 640px) {
      .slide { position: static; min-height: 100vh; }
      .slide.active { display: flex; flex-direction: column; }
    }

    /* ═══════════════════════════════════
       COVER SLIDE
    ═══════════════════════════════════ */
    .cover {
      background: var(--dark);
      align-items: center;
      justify-content: center;
      gap: 16px;
      position: relative;
      overflow: hidden;
      padding: 48px 40px;
      height: 100vh;
      text-align: center;
    }

    @media (max-width: 640px) {
      .cover { height: 100svh; min-height: 600px; }
    }

    .cover-bg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center 15%;
      opacity: 0.45;
      z-index: 0;
    }
    .cover-gradient {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom,
        rgba(30,24,16,0.85) 0%,
        rgba(30,24,16,0.50) 30%,
        transparent 45%,
        transparent 58%,
        rgba(30,24,16,0.65) 78%,
        rgba(30,24,16,0.92) 100%);
      z-index: 1;
    }
    .cover > *:not(.cover-bg):not(.cover-gradient) { position: relative; z-index: 2; }

    .cover-badge {
      font-size: 11px;
      letter-spacing: 5px;
      text-transform: uppercase;
      padding: 5px 18px;
      border: 1px solid rgba(250,248,244,0.4);
      border-radius: 40px;
      color: rgba(250,248,244,0.75);
    }
    .cover-om   { font-size: 72px; color: var(--gold); line-height: 1; }
    .cover-title {
      font-size: clamp(26px, 5vw, 50px);
      color: #FAF8F4;
      letter-spacing: 1px;
      line-height: 1.2;
    }
    .cover-sub {
      font-size: 12px;
      color: var(--gold);
      letter-spacing: 5px;
      text-transform: uppercase;
    }
    .cover-rule {
      width: 70px; height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
    }
    .cover-instructors {
      font-size: clamp(13px, 1.6vw, 17px);
      color: rgba(250,248,244,0.70);
      font-style: italic;
      line-height: 2;
      letter-spacing: 0.3px;
    }
    .cover-instructors span {
      font-style: normal;
      color: rgba(250,248,244,0.90);
      font-size: 1.05em;
    }
    .cover-note {
      font-size: 12px;
      color: rgba(250,248,244,0.45);
      font-style: italic;
      line-height: 1.8;
    }
    .cover-begin {
      margin-top: 8px;
      background: var(--terra);
      border: none;
      color: #fff;
      font-family: Georgia, serif;
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 13px 40px;
      border-radius: 2px;
      cursor: pointer;
      transition: opacity .2s;
    }
    .cover-begin:hover { opacity: .82; }
    .cover-credit {
      font-size: 9px;
      color: rgba(250,248,244,0.22);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: 6px;
    }

    /* ═══════════════════════════════════
       SECTION HEADER SLIDE
    ═══════════════════════════════════ */
    .section-slide {
      background: var(--dark);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 18px;
      text-align: center;
      padding: 48px 40px;
      position: relative;
      overflow: hidden;
    }
    .section-slide .cover-bg {
      opacity: 0.25;
    }
    .section-slide > *:not(.cover-bg):not(.cover-gradient) { position: relative; z-index: 2; }
    .section-label {
      font-size: 11px;
      letter-spacing: 5px;
      text-transform: uppercase;
      padding: 4px 16px;
      border-radius: 40px;
      border: 1px solid rgba(250,248,244,0.3);
      color: rgba(250,248,244,0.6);
    }
    .section-title {
      font-size: clamp(28px, 5vw, 54px);
      color: #FAF8F4;
      letter-spacing: 1px;
      line-height: 1.2;
    }
    .section-sub {
      font-size: 13px;
      color: rgba(250,248,244,0.55);
      font-style: italic;
      letter-spacing: 0.5px;
      max-width: 480px;
    }
    .section-rule {
      width: 60px; height: 1px;
      background: linear-gradient(to right, transparent, rgba(250,248,244,0.4), transparent);
    }
    .section-instructor-badge {
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 5px 20px;
      border-radius: 40px;
      color: #fff;
      margin-top: 4px;
    }

    /* ═══════════════════════════════════
       CONTENT SLIDE (two-panel)
    ═══════════════════════════════════ */
    /* ── NAV BAR ── */
    .slide-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background: var(--dark);
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .nav-btn {
      background: transparent;
      border: 1px solid rgba(250,248,244,0.2);
      color: rgba(250,248,244,0.75);
      font-family: Georgia, serif;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 2px;
      cursor: pointer;
      transition: background .18s, border-color .18s;
    }
    .nav-btn:hover { background: rgba(250,248,244,0.08); border-color: rgba(250,248,244,0.4); }
    .nav-btn.primary {
      background: var(--terra);
      border-color: var(--terra);
      color: #fff;
    }
    .nav-btn.primary:hover { opacity: .85; }
    .nav-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .nav-slide-num {
      font-size: 10px;
      color: rgba(250,248,244,0.35);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .nav-dots {
      display: flex;
      gap: 5px;
      align-items: center;
    }
    .nav-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: rgba(250,248,244,0.2);
      transition: background .2s;
    }
    .nav-dot.active { background: var(--terra); }
    .nav-dot.section-dot { background: rgba(250,248,244,0.45); width: 4px; height: 4px; }

    /* ── CONTENT BODY ── */
    .slide-body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    @media (max-width: 640px) {
      .slide-body { flex-direction: column; overflow: visible; }
    }

    /* LEFT PANEL */
    .panel-left {
      width: 45%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #F0EBE2;
      padding: 32px;
      flex-shrink: 0;
    }

    @media (max-width: 640px) {
      .panel-left { width: 100%; min-height: 280px; padding: 24px; }
    }

    .pose-img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
    }

    /* RIGHT PANEL */
    .panel-right {
      flex: 1;
      padding: 36px 36px 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
    }

    @media (max-width: 640px) {
      .panel-right { padding: 24px 20px 32px; overflow-y: visible; }
    }

    .pose-num {
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--muted);
    }
    .pose-sanskrit {
      font-size: clamp(20px, 3vw, 32px);
      color: var(--text);
      letter-spacing: 0.5px;
      line-height: 1.2;
    }
    .pose-english {
      font-size: clamp(13px, 1.4vw, 16px);
      color: var(--muted);
      font-style: italic;
      margin-top: -8px;
    }
    .pose-variants {
      font-size: 12px;
      color: var(--terra);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: -4px;
    }
    .pose-rule {
      width: 40px; height: 1px;
      background: var(--rule);
      margin: 4px 0;
    }
    .tips-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .tips-list li {
      font-size: clamp(13px, 1.3vw, 15px);
      color: var(--text);
      padding-left: 18px;
      position: relative;
      line-height: 1.6;
    }
    .tips-list li::before {
      content: '—';
      position: absolute;
      left: 0;
      color: var(--muted);
      font-size: 12px;
      top: 3px;
    }

    /* Teacher cue gold box */
    .cue-box {
      background: rgba(184,135,46,0.10);
      border-left: 3px solid var(--gold);
      padding: 12px 16px;
      border-radius: 0 4px 4px 0;
      margin-top: 4px;
    }
    .cue-label {
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 4px;
    }
    .cue-text {
      font-size: clamp(13px, 1.3vw, 15px);
      color: var(--text);
      font-style: italic;
      line-height: 1.6;
    }

    /* Instructor tag */
    .instructor-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 40px;
      border: 1px solid;
      align-self: flex-start;
      margin-top: auto;
    }
    .tag-ammo    { color: var(--ammo);   border-color: var(--ammo);   }
    .tag-thanu   { color: var(--thanu);  border-color: var(--thanu);  }
    .tag-markus  { color: var(--markus); border-color: var(--markus); }
    .tag-group   { color: var(--group);  border-color: var(--group);  }

    /* ═══════════════════════════════════
       SIMPLE INFO SLIDE (no image)
    ═══════════════════════════════════ */
    .info-slide {
      flex-direction: column;
      background: var(--bg);
    }
    .info-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 40px 52px;
      gap: 20px;
    }

    @media (max-width: 640px) {
      .info-body { padding: 28px 24px; }
    }

    .info-title {
      font-size: clamp(24px, 3.5vw, 40px);
      color: var(--text);
      letter-spacing: 0.5px;
      line-height: 1.25;
    }
    .info-sub {
      font-size: 13px;
      color: var(--muted);
      font-style: italic;
    }
    .info-rule {
      width: 40px; height: 1px;
      background: var(--rule);
    }
    .info-content {
      font-size: clamp(14px, 1.4vw, 16px);
      color: var(--text);
      line-height: 1.9;
    }
    .info-content strong {
      color: var(--terra);
      font-style: normal;
    }

    /* Flow table for sun sal slides */
    .flow-table {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 4px;
    }
    .flow-row {
      display: flex;
      align-items: baseline;
      gap: 14px;
      font-size: clamp(13px, 1.3vw, 15px);
      color: var(--text);
      padding: 8px 14px;
      background: rgba(200,98,42,0.05);
      border-radius: 4px;
    }
    .flow-row .step-num {
      font-size: 10px;
      color: var(--terra);
      letter-spacing: 2px;
      text-transform: uppercase;
      min-width: 50px;
      flex-shrink: 0;
    }
    .flow-row .step-name { flex: 1; }
    .flow-row .step-breath {
      font-size: 11px;
      color: var(--muted);
      font-style: italic;
    }

    /* Mantra text slide */
    .mantra-text {
      font-size: clamp(15px, 1.8vw, 20px);
      color: var(--text);
      line-height: 2.1;
      font-style: italic;
    }
    .mantra-translation {
      font-size: clamp(12px, 1.2vw, 14px);
      color: var(--muted);
      line-height: 1.9;
      margin-top: 4px;
    }

    /* ─── CLOSING / SHAVASANA ─── */
    .closing-slide {
      background: var(--dark);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      text-align: center;
      padding: 48px 40px;
      position: relative;
      overflow: hidden;
      min-height: 100vh;
    }
    .closing-slide .cover-bg { opacity: 0.2; }
    .closing-slide > *:not(.cover-bg):not(.cover-gradient) { position: relative; z-index: 2; }
    .closing-title {
      font-size: clamp(26px, 4vw, 48px);
      color: #FAF8F4;
      letter-spacing: 1px;
      line-height: 1.25;
    }
    .closing-sub {
      font-size: 14px;
      color: rgba(250,248,244,0.55);
      font-style: italic;
      max-width: 440px;
      line-height: 1.8;
    }
    .closing-om {
      font-size: 80px;
      color: var(--gold);
      line-height: 1;
    }
    .closing-mantra {
      font-size: clamp(14px, 1.6vw, 18px);
      color: rgba(250,248,244,0.85);
      line-height: 2.1;
      font-style: italic;
      max-width: 560px;
    }
    .closing-mantra-translation {
      font-size: 13px;
      color: rgba(250,248,244,0.5);
      line-height: 1.9;
      max-width: 500px;
    }

    /* ─── HOME / REPEAT BUTTONS at end ─── */
    .end-btns {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 8px;
    }
    .end-btn {
      font-family: Georgia, serif;
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 11px 30px;
      border-radius: 2px;
      cursor: pointer;
      transition: opacity .2s, background .2s;
      border: none;
    }
    .end-btn.primary   { background: var(--terra); color: #fff; }
    .end-btn.ghost     { background: transparent; border: 1px solid rgba(250,248,244,0.3); color: rgba(250,248,244,0.65); }
    .end-btn:hover { opacity: .82; }

    /* ─── PROGRESS BAR ─── */
    .progress-bar {
      position: fixed;
      top: 0; left: 0;
      height: 2px;
      background: var(--terra);
      transition: width .3s;
      z-index: 100;
    }

    /* ─── COVER COLLAGE ─── */
    .cover-collage {
      position: absolute; inset: 0;
      display: flex;
      z-index: 0;
    }
    .collage-panel {
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    .collage-panel img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center 15%;
      display: block;
    }
    .collage-panel::after {
      content: '';
      position: absolute; inset: 0;
    }
    .collage-ammo::after   { background: rgba(42,107,140,0.40); }
    .collage-thanu::after  { background: rgba(92,122,62,0.40); }
    .collage-markus::after { background: rgba(200,98,42,0.40); }
    .collage-gradient {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom,
        rgba(20,16,10,0.80) 0%,
        rgba(20,16,10,0.25) 25%,
        transparent 42%,
        transparent 58%,
        rgba(20,16,10,0.50) 75%,
        rgba(20,16,10,0.90) 100%);
      z-index: 1;
    }

    /* ─── COVER TRIO AVATARS ─── */
    .cover-trio {
      display: flex;
      gap: 28px;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 2;
    }
    .cover-trio-person {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .cover-trio-avatar {
      width: 76px; height: 76px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center top;
      border: 2px solid rgba(250,248,244,0.5);
    }
    .cover-trio-name {
      font-family: Georgia, serif;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(250,248,244,0.85);
    }

    /* ─── INSTRUCTOR AVATAR (slide panels) ─── */
    .instructor-avatar {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .avatar-img {
      width: 52px; height: 52px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center top;
      border: 2px solid;
      flex-shrink: 0;
    }
    .avatar-ammo   { border-color: var(--ammo); }
    .avatar-thanu  { border-color: var(--thanu); }
    .avatar-markus { border-color: var(--markus); }
    .avatar-label { display: flex; flex-direction: column; gap: 2px; }
    .avatar-name  { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; }
    .avatar-role  { font-size: 11px; font-style: italic; color: var(--muted); }
    .tag-ammo  .avatar-name { color: var(--ammo); }
    .tag-thanu .avatar-name { color: var(--thanu); }
    .tag-markus .avatar-name { color: var(--markus); }

    /* Keyboard hint */
    .key-hint {
      position: fixed;
      bottom: 14px;
      right: 18px;
      font-family: Georgia, serif;
      font-size: 10px;
      color: rgba(44,58,74,0.4);
      letter-spacing: 1px;
      pointer-events: none;
      z-index: 50;
    }
    @media (max-width: 640px) { .key-hint { display: none; } }
  </style>
</head>
<body>

<div class="progress-bar" id="progressBar"></div>
<div class="key-hint">← → keys to navigate</div>
