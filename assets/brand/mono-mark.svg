<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="CommonUnity mark (monochrome)">
  <!--
    mono-mark.svg — CommonUnity
    Single-color, currentColor-compatible.
    Set CSS `color` on the parent element to control fill/stroke.
    All strokes and fills use `currentColor`.
    Opacity variations provide the visual hierarchy.
    Works on any background; designed primarily for dark surfaces.
  -->
  <title>CommonUnity</title>

  <!-- ── Outer precision rings ──────────────────────────────── -->
  <circle cx="100" cy="100" r="92"   fill="none" stroke="currentColor" stroke-width="0.9"  opacity="0.38"/>
  <circle cx="100" cy="100" r="89.8" fill="none" stroke="currentColor" stroke-width="0.35" opacity="0.18"/>

  <!-- ── Twelve graduation ticks ────────────────────────────── -->
  <g stroke="currentColor" stroke-width="0.9" stroke-linecap="round" opacity="0.45">
    <line x1="192" y1="100"    x2="184"   y2="100"/>
    <line x1="8"   y1="100"    x2="16"    y2="100"/>
    <line x1="179.4" y1="150"  x2="172.5" y2="138.1"/>
    <line x1="20.6"  y1="50"   x2="27.5"  y2="61.9"/>
    <line x1="146"   y1="167.1" x2="140.2" y2="156.7"/>
    <line x1="54"    y1="32.9"  x2="59.8"  y2="43.3"/>
    <line x1="100"   y1="192"   x2="100"   y2="184"/>
    <line x1="100"   y1="8"     x2="100"   y2="16"/>
    <line x1="54"    y1="167.1" x2="59.8"  y2="156.7"/>
    <line x1="146"   y1="32.9"  x2="140.2" y2="43.3"/>
    <line x1="20.6"  y1="150"   x2="27.5"  y2="138.1"/>
    <line x1="179.4" y1="50"    x2="172.5" y2="61.9"/>
  </g>

  <!-- ── Seed of life substrate ─────────────────────────────── -->
  <g fill="none" stroke="currentColor" stroke-width="0.6" opacity="0.15">
    <circle cx="100" cy="100" r="28"/>
    <circle cx="128" cy="100" r="28"/>
    <circle cx="114" cy="124.25" r="28"/>
    <circle cx="86"  cy="124.25" r="28"/>
    <circle cx="72"  cy="100"    r="28"/>
    <circle cx="86"  cy="75.75"  r="28"/>
    <circle cx="114" cy="75.75"  r="28"/>
  </g>

  <!-- ── Resonance rings ────────────────────────────────────── -->
  <circle cx="100" cy="100" r="74" fill="none" stroke="currentColor" stroke-width="0.7" opacity="0.32"/>
  <circle cx="100" cy="100" r="56" fill="none" stroke="currentColor" stroke-width="0.7" opacity="0.52"/>
  <circle cx="100" cy="100" r="38" fill="none" stroke="currentColor" stroke-width="0.6" opacity="0.30"/>

  <!-- ── OM FORM ─────────────────────────────────────────────── -->
  <!-- A — lower bowl -->
  <path
    d="M 74 116 A 26 19 0 0 0 126 116"
    fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" opacity="0.95"
  />
  <!-- Uprights -->
  <line x1="74"  y1="116" x2="74"  y2="95" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" opacity="0.95"/>
  <line x1="126" y1="116" x2="126" y2="95" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" opacity="0.95"/>
  <!-- U — upper arch -->
  <path
    d="M 74 95 A 26 20 0 0 1 126 95"
    fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" opacity="0.95"
  />
  <!-- M — hook -->
  <path
    d="M 126 95 C 143 95, 148 80, 136 74"
    fill="none" stroke="currentColor" stroke-width="2.0" stroke-linecap="round" opacity="0.80"
  />
  <!-- Loop at hook tip -->
  <path
    d="M 136 74 A 5.5 5.5 0 1 0 130.8 65"
    fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" opacity="0.75"
  />

  <!-- ── Bar (chandrabindu rule) ─────────────────────────────── -->
  <line
    x1="82" y1="59"
    x2="124" y2="59"
    stroke="currentColor" stroke-width="1.4" stroke-linecap="round" opacity="0.62"
  />

  <!-- ── Bindu ──────────────────────────────────────────────── -->
  <circle cx="103" cy="50" r="4.5" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.75"/>
  <circle cx="103" cy="50" r="2.2"  fill="currentColor" opacity="0.95"/>

  <!-- ── Crosshair stubs ───────────────────────────────────── -->
  <g stroke="currentColor" stroke-width="0.65" stroke-linecap="round" opacity="0.20">
    <line x1="100" y1="20"  x2="100" y2="38"/>
    <line x1="100" y1="162" x2="100" y2="178"/>
    <line x1="22"  y1="100" x2="40"  y2="100"/>
    <line x1="160" y1="100" x2="178" y2="100"/>
  </g>

</svg>
