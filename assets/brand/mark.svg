<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="CommonUnity mark">
  <title>CommonUnity</title>
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#152030"/>
      <stop offset="100%" stop-color="#0b1120"/>
    </radialGradient>
    <!-- Warm amber glow behind OM form -->
    <radialGradient id="omGlow" cx="50%" cy="58%" r="44%">
      <stop offset="0%"   stop-color="#B8872E" stop-opacity="0.18"/>
      <stop offset="65%"  stop-color="#B8872E" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#B8872E" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Field -->
  <circle cx="100" cy="100" r="99" fill="url(#bgGlow)"/>

  <!-- ── Outer precision rings ──────────────────────────────── -->
  <circle cx="100" cy="100" r="92"   fill="none" stroke="#2A6B8C" stroke-width="0.9"  opacity="0.38"/>
  <circle cx="100" cy="100" r="89.8" fill="none" stroke="#2A6B8C" stroke-width="0.35" opacity="0.18"/>

  <!-- ── Twelve graduation ticks (clock-face / instrument dial) -->
  <!-- Six axes × 2 ends = 12 ticks. Inner edge at r=84, outer at r=90 -->
  <g stroke="#2A6B8C" stroke-width="0.9" stroke-linecap="round" opacity="0.52">
    <line x1="192" y1="100"    x2="184"   y2="100"/>
    <line x1="8"   y1="100"    x2="16"    y2="100"/>
    <!-- 30° -->
    <line x1="179.4" y1="150"  x2="172.5" y2="138.1"/>
    <line x1="20.6"  y1="50"   x2="27.5"  y2="61.9"/>
    <!-- 60° -->
    <line x1="146"   y1="167.1" x2="140.2" y2="156.7"/>
    <line x1="54"    y1="32.9"  x2="59.8"  y2="43.3"/>
    <!-- 90° -->
    <line x1="100"   y1="192"   x2="100"   y2="184"/>
    <line x1="100"   y1="8"     x2="100"   y2="16"/>
    <!-- 120° -->
    <line x1="54"    y1="167.1" x2="59.8"  y2="156.7"/>
    <line x1="146"   y1="32.9"  x2="140.2" y2="43.3"/>
    <!-- 150° -->
    <line x1="20.6"  y1="150"   x2="27.5"  y2="138.1"/>
    <line x1="179.4" y1="50"    x2="172.5" y2="61.9"/>
  </g>

  <!-- ── Seed of life (substrate, very faint) ───────────────── -->
  <g fill="none" stroke="#5C7A3E" stroke-width="0.6" opacity="0.20">
    <circle cx="100" cy="100" r="28"/>
    <circle cx="128" cy="100" r="28"/>
    <circle cx="114" cy="124.25" r="28"/>
    <circle cx="86"  cy="124.25" r="28"/>
    <circle cx="72"  cy="100"    r="28"/>
    <circle cx="86"  cy="75.75"  r="28"/>
    <circle cx="114" cy="75.75"  r="28"/>
  </g>

  <!-- ── Resonance rings ────────────────────────────────────── -->
  <circle cx="100" cy="100" r="74" fill="none" stroke="#2A6B8C" stroke-width="0.7" opacity="0.36"/>
  <circle cx="100" cy="100" r="56" fill="none" stroke="#B8872E" stroke-width="0.7" opacity="0.42"/>
  <circle cx="100" cy="100" r="38" fill="none" stroke="#5C7A3E" stroke-width="0.6" opacity="0.35"/>

  <!-- ── OM FORM ─────────────────────────────────────────────
       Geometric encoding of Aum / OM structure.
       Reference: the three curves of Aum (A, U, M) and the
       anusvaara (nasalisation mark) above — dot + bar.

       Coordinate frame: centered at (100, 112) for visual balance.
       Total form height ≈ 68px, width ≈ 60px.

       A  = lower bowl — a wide elliptical arc, open at top
       U  = upper arch — closes above the bowl
       M  = rightward hook with closed loop (the virama tail)
       —  = horizontal bar (chandrabindu diacritic)
       •  = bindu dot
  ──────────────────────────────────────────────────────────── -->

  <!-- Ambient warm glow -->
  <ellipse cx="100" cy="110" rx="46" ry="52" fill="url(#omGlow)"/>

  <!-- A — lower bowl: wide arc at bottom, rx=26, ry=18, open upward -->
  <!-- Arc from left (74,118) sweeping under to right (126,118) -->
  <path
    d="M 74 116 A 26 19 0 0 0 126 116"
    fill="none" stroke="#B8872E" stroke-width="2.4" stroke-linecap="round" opacity="0.93"
  />

  <!-- Vertical walls rising from bowl ends up to arch -->
  <line x1="74"  y1="116" x2="74"  y2="95" stroke="#B8872E" stroke-width="2.4" stroke-linecap="round" opacity="0.93"/>
  <line x1="126" y1="116" x2="126" y2="95" stroke="#B8872E" stroke-width="2.4" stroke-linecap="round" opacity="0.93"/>

  <!-- U — upper arch: arc from (74,95) to (126,95) bowing upward, ry=20 -->
  <path
    d="M 74 95 A 26 20 0 0 1 126 95"
    fill="none" stroke="#B8872E" stroke-width="2.4" stroke-linecap="round" opacity="0.93"
  />

  <!-- M — hook: S-curve extending right from top-right corner,
       curling upward into a closed loop.
       Start: (126, 95) → bezier control points → end at loop base (137, 78) -->
  <path
    d="M 126 95 C 143 95, 148 80, 136 74"
    fill="none" stroke="#C8622A" stroke-width="2.0" stroke-linecap="round" opacity="0.90"
  />
  <!-- Closed loop at hook tip: small circle arc (≈radius 5.5) -->
  <path
    d="M 136 74 A 5.5 5.5 0 1 0 130.8 65"
    fill="none" stroke="#C8622A" stroke-width="1.8" stroke-linecap="round" opacity="0.85"
  />

  <!-- ── Chandra (crescent) + Bindu ───────────────────────────
       Crescent moon sits above the OM form, opening upward —
       a stronger nod to Turiya / silence than a straight bar.
       Bindu rests above the crescent's cup. -->

  <!-- Crescent: upward-opening cup, centred at x=100, mouth y=60, apex y=72 -->
  <path
    d="M 84 60 Q 100 72 116 60"
    fill="none" stroke="#FAF8F4" stroke-width="1.6" stroke-linecap="round" opacity="0.72"
  />

  <!-- Bindu outer ring -->
  <circle cx="100" cy="50" r="4.5" fill="none" stroke="#B8872E" stroke-width="1.5" opacity="0.85"/>
  <!-- Bindu fill -->
  <circle cx="100" cy="50" r="2.2"  fill="#B8872E" opacity="0.97"/>

  <!-- ── Axial crosshair stubs (precision overlay, outside form zone) -->
  <g stroke="#FAF8F4" stroke-width="0.65" stroke-linecap="round" opacity="0.18">
    <line x1="100" y1="20"  x2="100" y2="38"/>
    <line x1="100" y1="162" x2="100" y2="178"/>
    <line x1="22"  y1="100" x2="40"  y2="100"/>
    <line x1="160" y1="100" x2="178" y2="100"/>
  </g>

</svg>
