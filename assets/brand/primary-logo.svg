<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 80" width="520" height="80" role="img" aria-label="CommonUnity — Instruments for inner precision">
  <title>CommonUnity</title>
  <defs>
    <radialGradient id="bgGlowPL" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#152030"/>
      <stop offset="100%" stop-color="#0b1120"/>
    </radialGradient>
    <radialGradient id="omGlowPL" cx="50%" cy="58%" r="44%">
      <stop offset="0%"   stop-color="#B8872E" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#B8872E" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="520" height="80" fill="#0b1120" rx="3"/>

  <!-- ═══════════════════════════════════════════════════════
       MARK (40,40 center, geometry scaled to ×0.37 of 200px source)
       ═══════════════════════════════════════════════════════ -->
  <g transform="translate(40,40) scale(0.37)">
    <!-- Outer rings -->
    <circle r="92"   fill="none" stroke="#2A6B8C" stroke-width="0.9"  opacity="0.40"/>
    <circle r="89.8" fill="none" stroke="#2A6B8C" stroke-width="0.35" opacity="0.18"/>

    <!-- 12 tick marks -->
    <g stroke="#2A6B8C" stroke-width="0.9" stroke-linecap="round" opacity="0.52">
      <line x1="92"    y1="0"      x2="84"    y2="0"/>
      <line x1="-92"   y1="0"      x2="-84"   y2="0"/>
      <line x1="79.6"  y1="46"     x2="72.5"  y2="38.1"/>
      <line x1="-79.6" y1="-46"    x2="-72.5" y2="-38.1"/>
      <line x1="46"    y1="79.67"  x2="40.2"  y2="69.27"/>
      <line x1="-46"   y1="-79.67" x2="-40.2" y2="-69.27"/>
      <line x1="0"     y1="92"     x2="0"     y2="84"/>
      <line x1="0"     y1="-92"    x2="0"     y2="-84"/>
      <line x1="-46"   y1="79.67"  x2="-40.2" y2="69.27"/>
      <line x1="46"    y1="-79.67" x2="40.2"  y2="-69.27"/>
      <line x1="-79.6" y1="46"     x2="-72.5" y2="38.1"/>
      <line x1="79.6"  y1="-46"    x2="72.5"  y2="-38.1"/>
    </g>

    <!-- Seed of life ghost -->
    <g fill="none" stroke="#5C7A3E" stroke-width="0.6" opacity="0.20">
      <circle cx="0"   cy="0"      r="28"/>
      <circle cx="28"  cy="0"      r="28"/>
      <circle cx="14"  cy="24.25"  r="28"/>
      <circle cx="-14" cy="24.25"  r="28"/>
      <circle cx="-28" cy="0"      r="28"/>
      <circle cx="-14" cy="-24.25" r="28"/>
      <circle cx="14"  cy="-24.25" r="28"/>
    </g>

    <!-- Resonance rings -->
    <circle r="74" fill="none" stroke="#2A6B8C" stroke-width="0.7" opacity="0.36"/>
    <circle r="56" fill="none" stroke="#B8872E" stroke-width="0.7" opacity="0.42"/>
    <circle r="38" fill="none" stroke="#5C7A3E" stroke-width="0.6" opacity="0.35"/>

    <!-- OM form (centered at 0,12 within translated space = 100,112 globally) -->
    <g transform="translate(0,12)">
      <ellipse cx="0" cy="-2" rx="46" ry="52" fill="url(#omGlowPL)"/>
      <!-- A bowl -->
      <path d="M -26 16 A 26 19 0 0 0 26 16"  fill="none" stroke="#B8872E" stroke-width="2.4" stroke-linecap="round" opacity="0.93"/>
      <!-- Uprights -->
      <line x1="-26" y1="16" x2="-26" y2="-5" stroke="#B8872E" stroke-width="2.4" stroke-linecap="round" opacity="0.93"/>
      <line x1="26"  y1="16" x2="26"  y2="-5" stroke="#B8872E" stroke-width="2.4" stroke-linecap="round" opacity="0.93"/>
      <!-- U arch -->
      <path d="M -26 -5 A 26 20 0 0 1 26 -5"  fill="none" stroke="#B8872E" stroke-width="2.4" stroke-linecap="round" opacity="0.93"/>
      <!-- M hook -->
      <path d="M 26 -5 C 43 -5, 48 -20, 36 -26" fill="none" stroke="#C8622A" stroke-width="2.0" stroke-linecap="round" opacity="0.90"/>
      <!-- Loop at hook tip -->
      <path d="M 36 -26 A 5.5 5.5 0 1 0 30.8 -35" fill="none" stroke="#C8622A" stroke-width="1.8" stroke-linecap="round" opacity="0.85"/>
      <!-- Bar -->
      <line x1="-18" y1="-41" x2="24" y2="-41" stroke="#FAF8F4" stroke-width="1.4" stroke-linecap="round" opacity="0.68"/>
      <!-- Bindu -->
      <circle cx="3" cy="-50" r="4.5" fill="none" stroke="#B8872E" stroke-width="1.5" opacity="0.82"/>
      <circle cx="3" cy="-50" r="2.2" fill="#B8872E" opacity="0.97"/>
    </g>

    <!-- Crosshair stubs -->
    <g stroke="#FAF8F4" stroke-width="0.65" stroke-linecap="round" opacity="0.18">
      <line x1="0"   y1="-74" x2="0"   y2="-58"/>
      <line x1="0"   y1="58"  x2="0"   y2="74"/>
      <line x1="-74" y1="0"   x2="-58" y2="0"/>
      <line x1="58"  y1="0"   x2="74"  y2="0"/>
    </g>
  </g>

  <!-- ═══════════════════════════════════════════════════════
       SEPARATOR
       ═══════════════════════════════════════════════════════ -->
  <line x1="84" y1="17" x2="84" y2="63" stroke="#2A6B8C" stroke-width="0.8" opacity="0.40"/>

  <!-- ═══════════════════════════════════════════════════════
       WORDMARK  "CommonUnity"
       Single font-size=26, weight=500 throughout.
       "om" lifted by weight (700) + gold fill only.
       All tspans inherit the same font-size — no vertical shift.
       Natural text flow; no x-position overrides between segments.
       ═══════════════════════════════════════════════════════ -->
  <text
    x="100"
    y="49"
    font-family="'DM Sans', 'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="26"
    font-weight="500"
    letter-spacing="1.2"
    fill="#D6E8F0"
    xml:space="preserve"
  ><tspan fill="#D6E8F0" font-weight="500">C</tspan><tspan fill="#C8962E" font-weight="700">om</tspan><tspan fill="#D6E8F0" font-weight="500">monUnity</tspan></text>

  <!-- Precision arc underline beneath "om"
       "om" sits approximately x=115 to x=153 in rendered output.
       The arc is a gentle upward bow (convex down) — echoing OM's lower bowl. -->
  <path
    d="M 116 54 Q 135 60 154 54"
    fill="none"
    stroke="#B8872E"
    stroke-width="1.3"
    stroke-linecap="round"
    opacity="0.72"
  />

  <!-- Small dot at arc centre — echoes the bindu -->
  <circle cx="135" cy="59" r="1.5" fill="#B8872E" opacity="0.65"/>

  <!-- ── Tagline ─────────────────────────────────────────────── -->
  <text
    x="512"
    y="71"
    font-family="'DM Sans', 'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="7"
    font-weight="300"
    letter-spacing="2"
    text-anchor="end"
    fill="#FAF8F4"
    opacity="0.32"
  >INSTRUMENTS FOR INNER PRECISION</text>

</svg>
